name: Python + Docs Checks and Tests

on:
  push:
    branches:
        - 'main'
        - 'future3/**'
        - 'phase/**'
    paths:
        - '.github/workflows/pythonpackage_future3.yml'
        - '.flake8'
        - 'run_flake8.sh'
        - '.coveragerc'
        - 'run_pytest.sh'
        - '**requirements*.txt'
        - '**.py'
        - 'pytest.ini'
  pull_request:
    branches:
        - 'main'
        - 'future3/**'
        - 'phase/**'
    paths:
        - '.github/workflows/pythonpackage_future3.yml'
        - '.flake8'
        - 'run_flake8.sh'
        - '.coveragerc'
        - 'run_pytest.sh'
        - '**requirements*.txt'
        - '**.py'
        - 'pytest.ini'

jobs:
  build:

    runs-on: ubuntu-latest
    strategy:
      max-parallel: 4
      matrix:
        python-version: ['3.9', '3.10', '3.11', '3.12', '3.13']

    steps:
    - uses: actions/checkout@v4
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y libasound2-dev pulseaudio

        CUR_DIR="$(pwd)"
        mkdir -p tmp && cd tmp && wget -q http://abyz.me.uk/lg/lg.zip && unzip lg.zip > /dev/null && cd lg && make && sudo make install
        cd "${CUR_DIR}" && sudo rm -rf tmp > /dev/null

        python3 -m venv .venv
        source ".venv/bin/activate"

        python3 -m pip install --upgrade pip
        pip3 install -r requirements.txt
        # For operation of the Jukebox, ZMQ must be compiled from sources due to Websocket support
        # Also install all optional dependencies
        pip3 install -r src/jukebox/components/rfid/hardware/fake_reader_gui/requirements.txt
        pip3 install -r src/jukebox/components/rfid/hardware/pn532_i2c_py532/requirements.txt
        pip3 install -r src/jukebox/components/rfid/hardware/rdm6300_serial/requirements.txt
        pip3 install -r src/jukebox/components/rfid/hardware/rc522_spi/requirements.txt
    - name: Run pytest with coverage
      env:
        # Coverage floor: hardening roadmap Phase 0b establishes the gate;
        # Phase 1 ratcheted to 42% (measured ~43%); Phase 3a ratcheted to
        # 43% (measured ~45%); Phase 3c ratcheted to 45% (measured ~47%
        # after playerspotify cleanup); Phase 3b ratchets to 50%
        # (measured ~52% on Python 3.11 after PodcastPlaybackState
        # seam, real-exercise lock-release tests, coordinator-pinning
        # tests, and the coordinator double-invoke regression test;
        # ~2% headroom).
        # Phase 6 ratchets to 53% (measured ~56% on Python 3.11 after
        # adding paths / plug_schema / readerbase heartbeat / jingle
        # lock-release / cfghandler getn / BackoffPolicy tests;
        # ~3% headroom).
        # Subsequent phases ratchet up as they add tests.
        COVERAGE_FAIL_UNDER: '53'
      run: |
        ./run_pytest.sh --cov --cov-report xml --cov-config=.coveragerc --cov-fail-under=${COVERAGE_FAIL_UNDER}
    - name: Report to Coveralls (parallel)
      uses: coverallsapp/github-action@v2
      with:
        github-token: ${{ secrets.GITHUB_TOKEN }}
        file: coverage.xml
        format: cobertura
        parallel: true
    - name: Lint with flake8
      run: |
        # Stop the build if linting fails
        ./run_flake8.sh

  finish:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Close parallel build
        uses: coverallsapp/github-action@v2
        with:
          parallel-finished: true
