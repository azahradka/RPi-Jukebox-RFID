name: Test Build Web App v3

on:
  schedule:
    # run at 18:00 every sunday
    - cron: '0 18 * * 0'
  push:
    branches:
        - 'main'
        - 'future3/**'
        - 'phase/**'
    paths:
        - '.github/workflows/test_build_webapp_v3.yml'
        - '.github/actions/build-webapp/**'
        - 'src/webapp/**'
  pull_request:
    branches:
        - 'main'
        - future3/develop
        - future3/main
        - 'phase/**'
    paths:
        - '.github/workflows/test_build_webapp_v3.yml'
        - '.github/actions/build-webapp/**'
        - 'src/webapp/**'

jobs:

  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Build Web App
        uses: ./.github/actions/build-webapp

      - name: Run React tests with coverage
        working-directory: src/webapp
        env:
          CI: 'true'
          # Webapp coverage floor. Phase 0b established the React test
          # scaffold (mockSocket, renderWithProviders) but no behavioural
          # tests yet, so this gate stayed at 0. Phase 4 (Web UI quick
          # wins) added the first behavioural tests (debounce,
          # subscription, error boundary, AppSettings, Folders,
          # SpotifySearch debounce, Cards register isolation) and set
          # the floor at 15/10. Phase 5b adds the useSpotifyAuth +
          # useSpotifySearch hooks, the split SettingsSpotify
          # subcomponents, and the shared-REQ-socket queue tests, lifting
          # measured coverage to ~32% statements / ~22% branches.
          # Floors ratchet to 25/18 to leave a small safety margin for
          # incremental refactors.
          WEBAPP_COVERAGE_FLOOR_LINES: '25'
          WEBAPP_COVERAGE_FLOOR_BRANCHES: '18'
        run: |
          npm test -- \
            --watchAll=false \
            --passWithNoTests \
            --coverage \
            --coverageReporters=text \
            --coverageReporters=text-summary \
            --coverageThreshold='{"global":{"statements":'"${WEBAPP_COVERAGE_FLOOR_LINES}"',"branches":'"${WEBAPP_COVERAGE_FLOOR_BRANCHES}"',"functions":'"${WEBAPP_COVERAGE_FLOOR_LINES}"',"lines":'"${WEBAPP_COVERAGE_FLOOR_LINES}"'}}'